<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Forever 💖</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.jpg">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: black;
    overflow: hidden;
    color: white;
}

/* ⭐ Star Background */
#stars {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    z-index: -4;
}

.star {
    position: absolute;
    background: white;
    border-radius: 50%;
    opacity: 0.8;
    animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
    from { opacity: 0.3; }
    to { opacity: 1; }
}

/* Background Slideshow */
#bg {
    position: fixed;
    top: -5%;
    left: -5%;
    width: 110%;
    height: 110%;
    background-size: cover;
    background-position: center;
    transition: opacity 1s ease, transform 8s ease;
    z-index: -3;
    opacity: 0;
}

/* Vignette */
#vignette {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle,
        rgba(0,0,0,0.2) 40%,
        rgba(0,0,0,0.75) 100%);
    z-index: -2;
}

/* Floating Content */
#content {
    position: absolute;
    top: 50%;
    width: 100%;
    transform: translateY(-50%);
    text-align: center;
    padding: 20px;
    text-shadow: 0 0 25px rgba(0,0,0,0.9);
}

#letter {
    max-width: 650px;
    margin: auto;
    font-size: 20px;
    line-height: 1.7;
    white-space: pre-line;
}

/* Buttons */
button {
    padding: 12px 24px;
    border-radius: 25px;
    border: none;
    margin: 10px;
    font-size: 16px;
}

.yes {
    background:#ff4d88;
    color:white;
}

.toggle-wrap {
    margin-top: 20px;
}

input[type="checkbox"] {
    transform: scale(1.4);
}
</style>
</head>

<body>

<audio id="music" loop playsinline src="Song.m4a"></audio>
<audio id="successVoice" playsinline src="Success.m4a"></audio>
<audio id="failVoice" playsinline src="Fail.m4a"></audio>

<div id="stars"></div>
<div id="bg"></div>
<div id="vignette"></div>

<div id="content">
    <h3>🔐 Private Access</h3>
    <p>Password hint: You should ideally know 💕</p>
    <input type="password" id="pass" placeholder="DDMMYYYY">
    <br><br>
    <button onclick="unlock()">Unlock</button>
    <p id="error"></p>
</div>

<script>

const password = "27042025";  // CHANGE IF NEEDED
const images = ["photo1.jpeg","photo2.jpeg","photo3.jpeg","photo4.jpeg","photo5.jpeg","photo6.jpeg"];

const bg = document.getElementById("bg");
const music = document.getElementById("music");
const successVoice = document.getElementById("successVoice");
const failVoice = document.getElementById("failVoice");
const errorText = document.getElementById("error");

let imgIndex = 0;

/* ⭐ Generate Stars */
const starsContainer = document.getElementById("stars");

for(let i=0;i<120;i++){
    let star = document.createElement("div");
    star.className = "star";
    star.style.width = star.style.height = Math.random()*3 + "px";
    star.style.top = Math.random()*100 + "vh";
    star.style.left = Math.random()*100 + "vw";
    starsContainer.appendChild(star);
}

/* Unlock */
function unlock(){
    const entered = document.getElementById("pass").value;

    if(entered === password){
        successVoice.play().catch(()=>{});
        startApp();
    } else {
        failVoice.play().catch(()=>{});
        errorText.innerText = "Try again baby 😘";
    }
}

/* Start Romantic Screen */
function startApp(){

    document.getElementById("stars").style.display = "none";

    document.getElementById("content").innerHTML = `
        <h2>For You 💖</h2>
        <div id="letter"></div>
        <div id="buttons"></div>
    `;

    startMusic();
    startSlideshow();
    typeWriter();
}

/* Music Fade */
function startMusic(){
    music.volume = 0;
    music.play().catch(()=>{});
    let fade = setInterval(()=>{
        if(music.volume < 0.3) music.volume += 0.02;
        else clearInterval(fade);
    },200);
}

/* Slideshow */
function startSlideshow(){

    bg.style.backgroundImage = `url(${images[0]})`;
    bg.style.opacity = 1;
    bg.style.transform = "scale(1.05)";

    setInterval(() => {

        bg.style.opacity = 0;

        setTimeout(() => {
            imgIndex = (imgIndex + 1) % images.length;
            bg.style.backgroundImage = `url(${images[imgIndex]})`;
            bg.style.opacity = 1;
            bg.style.transform = "scale(1.1)";
        }, 1000);

    }, 7000);
}

/* Slow Typewriter */
let text = `Hii Boo Boo,
Meri Cutie Patootie,
Mera shona,
Meri jaanu

I love you soo soo much.
Ummm, I thought to use some of the technical skills
and obvio GPT to make this small gesture.

So, I wanted to let you know
that you are doing so so well in life.
I am very proud of you.
Dont ever ever doubt yourself and I will always stand by you.
Just wanted you to know this.

And From the day we met,
you became my safest place.

In every lifetime,
I will choose you. ❤️`;

let i = 0;

function typeWriter(){
    const letterDiv = document.getElementById("letter");

    if(i < text.length){
        letterDiv.innerHTML += text.charAt(i++);
        setTimeout(typeWriter, 80);   // slower for readability
    } else {
        showQuestion();
    }
}

/* After Letter */
function showQuestion(){
    const btnDiv = document.getElementById("buttons");

    btnDiv.innerHTML = `
        <p style="margin-top:30px; font-size:18px;">
            Did you like it? 💕
        </p>

        <button class="yes" onclick="celebrate()">Yes 💖</button>

        <div class="toggle-wrap">
            <label>No</label>
            <input type="checkbox" id="noToggle">
        </div>
    `;

    const toggle = document.getElementById("noToggle");

    toggle.addEventListener("change", function(){
        if(toggle.checked){
            toggle.checked = false;
            setTimeout(()=>{
                alert("Hehe nice try 😌 You loved it.");
            },200);
        }
    });
}

function celebrate(){
    document.getElementById("content").innerHTML =
        "<h1>That means everything to me 💖</h1>";
}

</script>

</body>
</html>
