<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>Forever 💖</title>

<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: black;
    color: white;
    overflow: hidden;
}

/* Background */
#bg {
    position: fixed;
    top: -5%;
    left: -5%;
    width: 110%;
    height: 110%;
    background-size: cover;
    background-position: center;
    transition: transform 0.3s ease, opacity 1s ease;
    z-index: -3;
}

/* Vignette */
#vignette {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle,
        rgba(0,0,0,0.25) 40%,
        rgba(0,0,0,0.7) 100%);
    z-index: -2;
}

/* App Container */
.app {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Glass Card */
.card {
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.08);
    border-radius: 30px;
    padding: 30px;
    width: 90%;
    max-width: 420px;
    text-align: center;
    animation: heartbeat 3s infinite;
}

@keyframes heartbeat {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.02); }
}

/* Text */
#letter {
    white-space: pre-line;
    line-height: 1.6;
    margin-top: 15px;
    text-shadow: 0 0 12px rgba(255,255,255,0.7);
}

/* Buttons */
button {
    padding: 14px 22px;
    border-radius: 30px;
    border: none;
    margin: 10px;
    font-size: 16px;
}

.yes { background:#ff4d88; color:white; }
.no { background:white; color:black; position:absolute; }
</style>
</head>

<body>

<!-- AUDIO -->
<audio id="music" loop playsinline src="Song.m4a"></audio>
<audio id="successVoice" playsinline src="Success.m4a"></audio>
<audio id="failVoice" playsinline src="Fail.m4a"></audio>

<div id="bg"></div>
<div id="vignette"></div>

<div class="app">
<div class="card" id="screen">

<h3>🔐 Private Access</h3>
<p>Password hint: You should ideally know 💕</p>
<input type="password" id="pass" placeholder="DDMMYYYY">
<br><br>
<button onclick="unlock()">Unlock</button>
<p id="error"></p>

</div>
</div>

<script>
const password = "27042025";
const images = ["photo1.jpeg","photo2.jpeg","photo3.jpeg","photo4.jpeg","photo5.jpeg","photo6.jpeg"];
let imgIndex = 0;

/* Proper element references */
const bg = document.getElementById("bg");
const passInput = document.getElementById("pass");
const screenDiv = document.getElementById("screen");
const music = document.getElementById("music");
const successVoice = document.getElementById("successVoice");
const failVoice = document.getElementById("failVoice");
const errorText = document.getElementById("error");

bg.style.backgroundImage = `url(${images[0]})`;

/* Swipe Photos */
let startX = 0;
document.addEventListener("touchstart", e => startX = e.touches[0].clientX);
document.addEventListener("touchend", e => {
    let diff = e.changedTouches[0].clientX - startX;
    if(Math.abs(diff) > 50){
        imgIndex = (imgIndex + 1) % images.length;
        bg.style.backgroundImage = `url(${images[imgIndex]})`;
    }
});

/* Parallax */
window.addEventListener("deviceorientation", e => {
    if(e.gamma && e.beta){
        bg.style.transform = `translate(${e.gamma/2}px, ${e.beta/2}px)`;
    }
});

function unlock(){
    if(passInput.value === password){
        successVoice.play().catch(()=>{});
        startApp();
    } else {
        failVoice.play().catch(()=>{});
        errorText.innerText = "Try again baby 😘";
    }
}

function startApp(){
    screenDiv.innerHTML = `
        <h2>For You 💖</h2>
        <div id="letter"></div>
        <div id="buttons"></div>
    `;
    startMusic();
    typeWriter();
}

function startMusic(){
    music.volume = 0;
    music.play().catch(()=>{});
    let fade = setInterval(()=>{
        if(music.volume < 0.3) music.volume += 0.02;
        else clearInterval(fade);
    },200);
}

let text = `My Love,

From the day we met,
you became my safest place.

In every lifetime,
I choose you. ❤️`;

let i = 0;

function typeWriter(){
    const letterDiv = document.getElementById("letter");

    if(i < text.length){
        letterDiv.innerHTML += text.charAt(i++);
        setTimeout(typeWriter,40);
    } else {
        const buttonsDiv = document.getElementById("buttons");
        buttonsDiv.innerHTML = `
            <button class="yes" onclick="celebrate()">Yes 💖</button>
            <button class="no" id="noBtn">No 🙈</button>
        `;

        const noBtn = document.getElementById("noBtn");
        noBtn.addEventListener("touchstart", ()=>{
            noBtn.style.top=Math.random()*70+"%";
            noBtn.style.left=Math.random()*70+"%";
        });
    }
}

function celebrate(){
    screenDiv.innerHTML = "<h1>Forever & Always 💖</h1>";
}
</script>

</body>
</html>
